    <div id="err-log" style="position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow-y:auto;background:rgba(0,0,0,0.92);color:#ff4444;font:11px monospace;padding:6px;z-index:99999;display:none;pointer-events:auto;"></div>
    <script>
    // On-screen error log for mobile debugging — remove after diagnosis
    (function(){
        var el=document.getElementById('err-log'), msgs=[];
        function log(s){ msgs.push(s); if(msgs.length>30)msgs.shift(); el.style.display='block'; el.innerHTML=msgs.join('<br>'); el.scrollTop=el.scrollHeight; }
        var _ce=console.error; console.error=function(){ _ce.apply(console,arguments); log([].map.call(arguments,function(a){return typeof a==='object'?JSON.stringify(a):String(a)}).join(' ')); };
        window.addEventListener('error',function(ev){ log('ERROR: '+ev.message+' @ '+ev.filename+':'+ev.lineno); });
        window.addEventListener('unhandledrejection',function(ev){ log('REJECT: '+(ev.reason&&ev.reason.message||ev.reason)); });
        el.addEventListener('click',function(){ el.style.display='none'; msgs=[]; });
    })();
    </script>
    <script>
        // Register service worker for PWA + offline support
